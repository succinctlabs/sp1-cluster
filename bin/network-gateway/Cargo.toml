[package]
name = "sp1-cluster-network-gateway"
description = "SDK-compatible ProverNetwork + ArtifactStore gateway for self-hosted sp1-cluster deployments."
version = { workspace = true }
edition = { workspace = true }
repository = { workspace = true }
keywords = { workspace = true }
categories = { workspace = true }

[lib]
path = "src/lib.rs"

[[bin]]
name = "sp1-cluster-network-gateway"
path = "src/main.rs"

[dependencies]
sp1-cluster-artifact = { workspace = true }
sp1-cluster-common = { workspace = true }

sp1-sdk = { workspace = true }

alloy-primitives = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }
axum = { workspace = true }
bincode = { workspace = true }
clap = { workspace = true }
dashmap = { workspace = true }
dotenv = { workspace = true }
futures = { workspace = true }
hex = { workspace = true }
mti = { workspace = true }
opentelemetry_sdk = { workspace = true }
prost = { workspace = true }
rustls = { workspace = true, features = ["ring"] }
serde = { workspace = true }
tokio = { workspace = true }
tokio-stream = { workspace = true }
tonic = { workspace = true }
tonic-web = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
alloy-signer = "=1.1.3"
alloy-signer-local = { workspace = true }
bincode = { workspace = true }
reqwest = { workspace = true }
tower = { workspace = true, features = ["util"] }
zstd = { workspace = true }
