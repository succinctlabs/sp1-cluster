services:
  # Redis service
  redis:
    image: bitnamisecure/redis:latest
    environment:
      - REDIS_PASSWORD=redispassword
      - REDIS_AOF_ENABLED=no
      # Keep below the cgroup limit; RSS overshoots maxmemory via fragmentation.
      - REDIS_EXTRA_FLAGS=--maxmemory 28gb
    volumes:
      - redis_data:/bitnami/redis/data
    ports:
      - "127.0.0.1:6379:6379"
    deploy:
      resources:
        limits:
          memory: 30G
        reservations:
          memory: 30G

  # PostgreSQL database
  postgresql:
    image: bitnamisecure/postgresql:latest
    environment:
      - POSTGRES_PASSWORD=postgrespassword
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
    volumes:
      - postgresql_data:/bitnami/postgresql
    ports:
      - "5432:5432"

  # API Service
  api:
    image: ghcr.io/succinctlabs/sp1-cluster:base-v2.5.4
    environment:
      - API_GRPC_ADDR=0.0.0.0:50051
      - API_HTTP_ADDR=0.0.0.0:3000
      - API_AUTO_MIGRATE=true
      - API_DATABASE_URL=postgresql://postgres:postgrespassword@postgresql:5432/postgres
    ports:
      - "127.0.0.1:50051:50051"
    depends_on:
      - postgresql

  # Coordinator Service
  coordinator:
    image: ghcr.io/succinctlabs/sp1-cluster:base-v2.5.4
    environment:
      - COORDINATOR_CLUSTER_RPC=http://api:50051
      - COORDINATOR_METRICS_ADDR=0.0.0.0:9090
      - COORDINATOR_ADDR=0.0.0.0:50051
    command: ["/bin/sh", "-c", "/coordinator"]
    # Expose coordinator for remote workers connecting from other machines.
    ports:
      - "0.0.0.0:50053:50051"
    depends_on:
      - api

  # CPU Node
  cpu-node:
    image: ghcr.io/succinctlabs/sp1-cluster:base-v2.5.4
    environment:
      - NODE_COORDINATOR_RPC=http://coordinator:50051
      # Concurrency budget: GiB of RAM dedicated to THIS worker, not the host total.
      # On a shared host (redis/coordinator/etc. co-located) the container memory limit
      # overstates what the worker owns, so the auto-derived budget over-admits tasks —
      # pin it explicitly. Never above deploy.resources.limits.memory below; set lower
      # when CPU cores are the binding resource.
      - WORKER_MAX_WEIGHT_OVERRIDE=96
      - NODE_ARTIFACT_STORE=redis
      - NODE_REDIS_NODES=redis://:redispassword@redis:6379/0
      - WORKER_TYPE=CPU
    volumes:
      - ${HOME}/.sp1/circuits:/root/.sp1/circuits
    command: ["/bin/sh", "-c", "/node"]
    shm_size: 96G
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 96G
        reservations:
          cpus: "4"
          memory: 96G
    depends_on:
      - coordinator
      - redis

  # CPU Node
  mixed:
    image: ghcr.io/succinctlabs/sp1-cluster:base-v2.5.4
    environment:
      - NODE_COORDINATOR_RPC=http://coordinator:50051
      # See cpu-node: GiB dedicated to this worker, at most the 96G limit below.
      - WORKER_MAX_WEIGHT_OVERRIDE=96
      - NODE_ARTIFACT_STORE=redis
      - NODE_REDIS_NODES=redis://:redispassword@redis:6379/0
      - WORKER_TYPE=ALL
    volumes:
      - ${HOME}/.sp1/circuits:/root/.sp1/circuits
    command: ["/bin/sh", "-c", "/app/sp1-cluster-node"]
    shm_size: 96G
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 96G
        reservations:
          cpus: "4"
          memory: 96G
    depends_on:
      - coordinator
      - redis

  # GPU Node
  gpu0:
    image: ghcr.io/succinctlabs/sp1-cluster:node-gpu-v2.5.4
    environment:
      - NODE_COORDINATOR_RPC=http://coordinator:50051
      # Must be <= container memory in GiB (see deploy.resources.limits.memory below).
      - WORKER_MAX_WEIGHT_OVERRIDE=24
      - NODE_ARTIFACT_STORE=redis
      - NODE_REDIS_NODES=redis://:redispassword@redis:6379/0
      - WORKER_TYPE=GPU
    deploy:
      resources:
        limits:
          cpus: "32"
          memory: 24G
        reservations:
          cpus: "32"
          memory: 24G
    depends_on:
      - coordinator
      - redis
      - cpu-node
    # GPU support - uncomment if you have NVIDIA GPU support configured with docker
    runtime: nvidia

  gpu1:
    environment:
      - CUDA_VISIBLE_DEVICES=1
    extends:
      service: gpu0

  gpu2:
    environment:
      - CUDA_VISIBLE_DEVICES=2
    extends:
      service: gpu0

  gpu3:
    environment:
      - CUDA_VISIBLE_DEVICES=3
    extends:
      service: gpu0

  gpu4:
    environment:
      - CUDA_VISIBLE_DEVICES=4
    extends:
      service: gpu0

  gpu5:
    environment:
      - CUDA_VISIBLE_DEVICES=5
    extends:
      service: gpu0

  gpu6:
    environment:
      - CUDA_VISIBLE_DEVICES=6
    extends:
      service: gpu0

  gpu7:
    environment:
      - CUDA_VISIBLE_DEVICES=7
    extends:
      service: gpu0

  # Fulfiller Service
  # DOMAIN: set to SPN_MAINNET_V1_DOMAIN for mainnet, defaults to SPN_SEPOLIA_V1_DOMAIN
  fulfiller:
    image: ghcr.io/succinctlabs/sp1-cluster:base-v2.5.4
    environment:
      - FULFILLER_CLUSTER_RPC=http://api:50051
      - FULFILLER_LOG_FORMAT=Pretty
      - FULFILLER_CLUSTER_ARTIFACT_STORE=redis
      - FULFILLER_VERSION=sp1-v6.1.0
      - FULFILLER_DOMAIN=${DOMAIN:-SPN_SEPOLIA_V1_DOMAIN}
      - FULFILLER_CLUSTER_REDIS_NODES=redis://:redispassword@redis:6379/0
      - FULFILLER_METRICS_ADDR=0.0.0.0:9090
      - FULFILLER_RPC_GRPC_ADDR=${RPC_GRPC_ADDR}
      - FULFILLER_SP1_PRIVATE_KEY=${SP1_PRIVATE_KEY}
    depends_on:
      - coordinator
      - redis
    command: ["/bin/sh", "-c", "/fulfiller"]

  # SDK-compatible gateway (opt-in via `--profile gateway`).
  #
  # GATEWAY_PUBLIC_HTTP_URL must be reachable from the *SDK caller* — that's
  # why the default points at 127.0.0.1:8081 (same host as compose). For
  # remote SDK callers, override it to your public hostname.
  network-gateway:
    image: ghcr.io/succinctlabs/sp1-cluster:base-v2.5.4
    profiles: ["gateway"]
    environment:
      - GATEWAY_GRPC_ADDR=0.0.0.0:50061
      - GATEWAY_HTTP_ADDR=0.0.0.0:8081
      - GATEWAY_PUBLIC_HTTP_URL=${GATEWAY_PUBLIC_HTTP_URL:-http://127.0.0.1:8081}
      - GATEWAY_CLUSTER_RPC=http://api:50051
      - GATEWAY_ARTIFACT_STORE=redis
      - GATEWAY_REDIS_NODES=redis://:redispassword@redis:6379/0
      - GATEWAY_PROGRAM_STORE=memory
      - GATEWAY_AUTH_MODE=${GATEWAY_AUTH_MODE:-none}
    ports:
      - "0.0.0.0:50061:50061"
      - "0.0.0.0:8081:8081"
    command: ["/bin/sh", "-c", "/network-gateway"]
    depends_on:
      - api
      - redis

  # Bidder Service
  bidder:
    image: ghcr.io/succinctlabs/sp1-cluster:base-v2.5.4
    environment:
      - BIDDER_LOG_FORMAT=Pretty
      - BIDDER_VERSION=sp1-v6.1.0
      - BIDDER_DOMAIN=${DOMAIN:-SPN_SEPOLIA_V1_DOMAIN}
      - BIDDER_METRICS_ADDR=0.0.0.0:9090
      - BIDDER_RPC_GRPC_ADDR=${RPC_GRPC_ADDR}
      - BIDDER_SP1_PRIVATE_KEY=${SP1_PRIVATE_KEY}
      # Sustained cluster proving rate in MGas/s (roughly 1-5 per GPU; err low).
      - BIDDER_THROUGHPUT_MGAS=1
      # Per-node CPU-worker RAM in GB, comma-separated (e.g. "96,96" for two nodes).
      - BIDDER_CPU_WORKER_MAX_WEIGHTS=96
      # Static bid in wei/PGU. Safety-net when the USD bid falls back (cache missing
      # or stale), or the unconditional bid if you opt out of the USD bid below.
      - BIDDER_BID_AMOUNT=500000000
      # USD-denominated bid is enabled by default. USD revenue per PGU stays predictable
      # across PROVE-price moves, and your bids stay within requester price limits.
      # Override the target via BIDDER_USD_BID_TARGET=<µUSD per BPGU> or opt out
      # entirely with BIDDER_USD_BID_ENABLED=false (falls back to BIDDER_BID_AMOUNT —
      # PROVE revenue is then fixed, but bids can fall outside requester limits when
      # PROVE moves significantly).
    command: ["/bin/sh", "-c", "/bidder"]

volumes:
  redis_data:
  postgresql_data:
