appName: cpu-node

replicaCount: 0

image:
  repository: ghcr.io/succinctlabs/sp1-cluster
  pullPolicy: IfNotPresent
  tag: base-latest

spec:
  strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: "100%"

# Expose metrics server to cluster
services:
  - name: metrics
    type: ClusterIP
    port: 9090
    targetPort: 9090

extraEnv: {}

extraEnvFrom: []

# Volume configuration
volumes:
  - name: shared-memory
    emptyDir:
      medium: Memory
      # Optionally, you can set an explicit size limit:
      # sizeLimit: 32Gi
      # We omit sizeLimit here, so that the maximum shared memory can use the entire memory limit of the pod.

volumeMounts:
  - name: shared-memory
    mountPath: /dev/shm

resources:
  requests: {}
  limits: {}

nodeSelector: {}

tolerations: []

affinity: {}
