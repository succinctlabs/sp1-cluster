name: E2E (gpu suite)

# Reusable body for the E2E suites. Callers pick the suite, runner family and
# timeout; everything else (runner setup, docker, circuit cache, suite run) is
# shared so the smoke/full tiers don't duplicate it.
on:
  workflow_call:
    inputs:
      suite:
        description: Suite to run (e.g. smoke, full)
        required: true
        type: string
      family:
        description: runs-on.com instance family for the GPU runner
        required: true
        type: string
      timeout:
        description: Job timeout in minutes
        required: true
        type: number

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  RUST_LOG: info

defaults:
  run:
    shell: bash

jobs:
  e2e-gpu:
    name: E2E ${{ inputs.suite }} (gpu flavor)
    timeout-minutes: ${{ inputs.timeout }}
    runs-on:
      [
        "runs-on",
        "family=${{ inputs.family }}",
        "hdd=200",
        "ami=ami-0f60240de60e318f9",
        "spot=false",
        "run-id=${{ github.run_id }}",
      ]
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PRIVATE_PULL_TOKEN }}

      - name: Size /dev/shm to RAM
        run: sudo mount -o remount,size=100% /dev/shm && df -h /dev/shm

      - name: Download suite binary
        uses: actions/download-artifact@v4
        with:
          name: sp1-test-cluster-gpu

      - name: GPU diagnostics
        run: |
          echo "--- nvidia-smi ---"; nvidia-smi || echo "nvidia-smi FAILED (driver not ready?)"
          echo "--- device nodes ---"; ls -l /dev/nvidia* 2>&1 || true
          echo "--- nvidia kernel modules ---"; lsmod | grep -i nvidia || echo "no nvidia modules loaded"
          echo "--- CUDA libs resolved by the suite binary ---"
          ldd ./sp1-test-cluster | grep -Ei "cuda|nvrtc|nvtools|not found" || echo "no cuda-related dynamic deps"

      - name: Initialize docker
        run: |
          sudo systemctl stop docker
          sudo rm -rf /var/lib/docker/* 2>/dev/null || true
          sudo systemctl start docker
          docker info

      - name: Pre-pull container images
        run: |
          docker pull -q bitnamisecure/redis:latest@sha256:d842c434ff617b84f954700b60fd99ac8b567ce16292daccb18cfc214cdcc2ec
          docker pull -q bitnamisecure/postgresql:latest@sha256:f60aa249d5be4ec1a9651ab05515f2eb9bb2b6eb664cd300abc19f13a208900d
          docker pull -q minio/minio:latest@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e

      - name: Compute circuit cache key
        id: sp1
        run: echo "version=$(awk '/^name = "sp1-sdk"$/ {found=1} found && /^version = / {gsub(/"/, "", $3); print $3; exit}' Cargo.lock)" >> "$GITHUB_OUTPUT"

      - name: circuit-artifacts-cache
        uses: actions/cache@v3
        with:
          path: ~/.sp1/circuits
          key: sp1-circuits-${{ steps.sp1.outputs.version }}
          restore-keys: sp1-circuits-

      - name: Run suite
        run: |
          chmod +x ./sp1-test-cluster
          ./sp1-test-cluster suite ${{ inputs.suite }}

      - name: Upload scenario logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ inputs.suite }}-gpu-logs
          path: target/test-cluster-logs/
