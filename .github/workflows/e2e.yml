name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  RUST_LOG: info

jobs:
  # Compile once on a cheap CPU-heavy machine (sp1-gpu-sys needs nvcc but no GPU at
  # build time); the GPU jobs only run the prebuilt binary, so the expensive GPU
  # instances spend no time compiling.
  build-e2e:
    name: Build e2e suite (gpu flavor)
    timeout-minutes: 90
    runs-on:
      [
        "runs-on",
        "runner=32cpu-linux-x64",
        "hdd=200",
        "run-id=${{ github.run_id }}",
        "spot=false",
        "tag=build-e2e",
      ]
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PRIVATE_PULL_TOKEN }}
      - uses: ./.github/actions/e2e-setup
      - name: Build suite binary
        run: cargo build --release --bin sp1-test-cluster --features gpu
      - name: Strip binary
        run: strip target/release/sp1-test-cluster
      - name: Upload suite binary
        uses: actions/upload-artifact@v4
        with:
          name: sp1-test-cluster-gpu
          path: target/release/sp1-test-cluster
          retention-days: 3

  e2e-smoke-gpu:
    name: E2E smoke (gpu flavor)
    needs: build-e2e
    if: github.event_name == 'pull_request'
    timeout-minutes: 60
    runs-on:
      [
        "runs-on",
        "family=g6.4xlarge",
        "hdd=200",
        "ami=ami-0a63dc9cb9e934ba3",
        "spot=false",
        "run-id=${{ github.run_id }}",
      ]
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PRIVATE_PULL_TOKEN }}
      - uses: ./.github/actions/e2e-run-setup
      - name: Download suite binary
        uses: actions/download-artifact@v4
        with:
          name: sp1-test-cluster-gpu
      - name: Run smoke suite (gpu)
        run: |
          chmod +x ./sp1-test-cluster
          ./sp1-test-cluster suite smoke
      - name: Upload scenario logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-gpu-logs
          path: target/test-cluster-logs/

  # The full tier runs on a 128GB-RAM GPU instance: gnark's plonk wrap peaks at ~57GB
  # scenario RSS (measured) and livelocks on 64GB machines.
  e2e-full-gpu:
    name: E2E full (gpu flavor)
    needs: build-e2e
    if: github.event_name != 'pull_request'
    timeout-minutes: 240
    runs-on:
      [
        "runs-on",
        "family=g6.8xlarge",
        "hdd=200",
        "ami=ami-0a63dc9cb9e934ba3",
        "spot=false",
        "run-id=${{ github.run_id }}",
      ]
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PRIVATE_PULL_TOKEN }}
      - uses: ./.github/actions/e2e-run-setup
      - name: Download suite binary
        uses: actions/download-artifact@v4
        with:
          name: sp1-test-cluster-gpu
      - name: Run full suite (gpu)
        run: |
          chmod +x ./sp1-test-cluster
          ./sp1-test-cluster suite full
      - name: Upload scenario logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-full-gpu-logs
          path: target/test-cluster-logs/
