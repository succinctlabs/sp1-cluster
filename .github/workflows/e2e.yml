name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  RUST_LOG: info

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-e2e:
    name: Build e2e suite (gpu flavor)
    timeout-minutes: 90
    runs-on:
      [
        "runs-on",
        "runner=64cpu-linux-x64",
        "hdd=200",
        "ami=ami-0f60240de60e318f9",
        "run-id=${{ github.run_id }}",
        "spot=false",
        "tag=build-e2e",
      ]
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PRIVATE_PULL_TOKEN }}

      - name: rust-cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.rustup/
          key: build-e2e-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: build-e2e-${{ runner.os }}-

      - name: Build suite binary
        env:
          RUSTFLAGS: -C link-arg=-B/usr/local/libexec/wild
        run: cargo build --release --bin sp1-test-cluster --features gpu

      - name: Upload suite binary
        uses: actions/upload-artifact@v4
        with:
          name: sp1-test-cluster-gpu
          path: target/release/sp1-test-cluster
          retention-days: 3

  # Smoke on PRs (smaller box, shorter budget), full when landing on main, both on
  # manual dispatch. The suite body is shared via e2e-run.yml so the tiers only
  # differ by these inputs.
  e2e-smoke:
    needs: build-e2e
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/e2e-run.yml
    with:
      suite: smoke
      family: g6.4xlarge
      timeout: 60
    secrets: inherit

  e2e-full:
    needs: build-e2e
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/e2e-run.yml
    with:
      suite: full
      family: g6.8xlarge
      timeout: 240
    secrets: inherit
