name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  RUST_LOG: info

# Explicit `shell: bash` (unlike the implicit default) turns on pipefail, which the
# curl-into-tar installs below rely on.
defaults:
  run:
    shell: bash

jobs:
  # Compile once on a cheap CPU-heavy machine (sp1-gpu-sys needs nvcc but no GPU at
  # build time); the GPU jobs only run the prebuilt binary, so the expensive GPU
  # instances spend no time compiling.
  build-e2e:
    name: Build e2e suite (gpu flavor)
    timeout-minutes: 90
    runs-on:
      [
        "runs-on",
        "runner=64cpu-linux-x64",
        "hdd=200",
        "run-id=${{ github.run_id }}",
        "spot=false",
        "tag=build-e2e",
      ]
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PRIVATE_PULL_TOKEN }}

      # The dependency set the node images use (infra/Dockerfile.node_gpu), minus
      # CUDA itself which is installed below.
      - name: Install system build dependencies
        run: |
          # apt upgrades of docker/containerd restart the daemon mid-job and break
          # /var/lib/docker (ephemeral-disk data-root) — pin whatever is running.
          sudo apt-mark hold docker-ce docker-ce-cli docker.io containerd.io containerd runc 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            openssl libssl-dev pkg-config build-essential libclang-dev python3-pip \
            diffutils gcc m4 make libnvtoolsext1 wget tar unzip git curl openssh-client

      # sp1-gpu-sys (sppark) needs CMake >= 3.24; ubuntu22's apt ships 3.22.
      - name: Install CMake >= 3.24
        run: |
          sudo pip3 install --upgrade cmake 2>/dev/null || pip3 install --user --upgrade cmake
          cmake --version | head -1

      # sp1-gpu-sys compiles CUDA kernels: needs nvcc. Build with CUDA 12.8 so the GPU
      # jobs only need a 565-series driver — a CUDA 13 build demands driver >= 580, and
      # replacing the AMI's driver stack with 580 proved fragile. (The node prod images
      # build with CUDA 13 inside nvidia/cuda devel containers instead, see
      # infra/Dockerfile.node_gpu.)
      - name: Install CUDA toolkit 12.8.1
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "12.8.1"
          # The local .run installer is ~4GB: don't let it churn the GitHub cache
          # (it would evict the rust cache), and the runners are ephemeral so a
          # local tool cache never survives anyway.
          use-github-cache: false
          use-local-cache: false

      # Needed by sp1-recursion-gnark-ffi's build.rs (native-gnark builds a Go library).
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.1"

      - name: Install protoc
        run: |
          PROTOC_ZIP=protoc-29.4-linux-x86_64.zip
          curl -OL https://github.com/protocolbuffers/protobuf/releases/download/v29.4/$PROTOC_ZIP
          sudo unzip -o $PROTOC_ZIP -d /usr/local bin/protoc
          sudo unzip -o $PROTOC_ZIP -d /usr/local 'include/*'
          rm -f $PROTOC_ZIP

      # Link with wild instead of GNU ld: the suite binary is huge (CUDA fatbins plus
      # debug info) and the final link is a serial chunk of every rebuild. The -B shim
      # makes cc's collect2 pick up the `ld` symlink, so no clang is needed.
      - name: Install wild linker
        run: |
          curl -sSfL https://github.com/davidlattimore/wild/releases/download/0.9.0/wild-linker-0.9.0-x86_64-unknown-linux-musl.tar.gz \
            | sudo tar -xz --strip-components=1 -C /usr/local/bin --wildcards '*/wild'
          sudo mkdir -p /usr/local/libexec/wild
          sudo ln -sf /usr/local/bin/wild /usr/local/libexec/wild/ld
          wild --version

      - name: rust-cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.rustup/
            target/
          # v2: CUDA 12.8 + wild changed every crate's fingerprint; don't restore
          # caches built with the old toolchain/flags.
          key: e2e-v2-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: e2e-v2-${{ runner.os }}-

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          # Must match rust-toolchain.toml — stable trips rustc depth-limit errors in alloy.
          toolchain: nightly-2025-10-15
          profile: minimal
          override: true

      # Not stripped: the GPU jobs diagnose scenario failures from backtraces in the
      # uploaded logs, and those need symbols.
      - name: Build suite binary
        env:
          RUSTFLAGS: -C link-arg=-B/usr/local/libexec/wild
        run: cargo build --release --bin sp1-test-cluster --features gpu

      - name: Upload suite binary
        uses: actions/upload-artifact@v4
        with:
          name: sp1-test-cluster-gpu
          path: target/release/sp1-test-cluster
          retention-days: 3

  # PRs run the smoke tier on a g6.4xlarge; pushes to main and manual dispatches run
  # the full tier on a g6.8xlarge — its 128GB RAM is required because gnark's plonk
  # wrap peaks at ~57GB scenario RSS (measured) and livelocks on 64GB machines.
  e2e-gpu:
    name: E2E ${{ github.event_name == 'pull_request' && 'smoke' || 'full' }} (gpu flavor)
    needs: build-e2e
    timeout-minutes: ${{ github.event_name == 'pull_request' && 60 || 240 }}
    runs-on:
      [
        "runs-on",
        "family=${{ github.event_name == 'pull_request' && 'g6.4xlarge' || 'g6.8xlarge' }}",
        "hdd=200",
        "ami=ami-0a63dc9cb9e934ba3",
        "spot=false",
        "run-id=${{ github.run_id }}",
      ]
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PRIVATE_PULL_TOKEN }}

      # The prover needs the full CUDA runtime library set, not just cudart: it does
      # runtime kernel codegen via NVRTC and uses NVTX — same reason the node's runtime
      # image is an nvidia/cuda runtime image (see infra/Dockerfile.node_gpu). Without
      # libnvrtc the GPU worker wedges during prover init and never registers, and
      # every scenario times out waiting for workers. cuda-libraries-12-8 is the
      # runtime metapackage (cudart+nvrtc+cublas+...) matching the 12.8.1 toolkit the
      # suite binary is built with.
      - name: Install CUDA runtime libraries
        run: |
          repo="ubuntu$(. /etc/os-release; echo ${VERSION_ID//./})"
          wget -q "https://developer.download.nvidia.com/compute/cuda/repos/${repo}/x86_64/cuda-keyring_1.1-1_all.deb"
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update -qq
          if ! ldconfig -p | grep -q libnvrtc.so.12; then
            sudo apt-get install -y -qq cuda-libraries-12-8 libnvtoolsext1
          fi
          echo "LD_LIBRARY_PATH=/usr/local/cuda-12.8/lib64:/usr/local/cuda/lib64:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      # The stock runner AMI ships driver 560, on which the suite binary has wedged at
      # prover init (cudart reports an insufficient driver); run on the 565 branch the
      # CUDA 12.8 build is paired with. The AMI's preinstalled stack conflicts with it
      # in apt's resolver (held and interdependent nvidia/libnvidia packages) — purge
      # it and install fresh.
      - name: Install NVIDIA driver 565
        run: |
          DRIVER_MAJOR=$(nvidia-smi --query-gpu=driver_version --format=csv,noheader 2>/dev/null | cut -d. -f1)
          if [ -z "$DRIVER_MAJOR" ] || [ "$DRIVER_MAJOR" -lt 565 ]; then
            echo "driver ${DRIVER_MAJOR:-absent} < 565; replacing with nvidia-driver-565"
            sudo apt-get remove -y --purge 'nvidia-*' 'libnvidia-*' 2>/dev/null || true
            sudo apt-get autoremove -y -qq || true
            sudo apt-get install -y --allow-change-held-packages nvidia-driver-565
            sudo rmmod nvidia_uvm nvidia_drm nvidia_modeset nvidia 2>/dev/null || true
            sudo modprobe nvidia
          fi
          nvidia-smi

      - name: Download suite binary
        uses: actions/download-artifact@v4
        with:
          name: sp1-test-cluster-gpu

      # The GPU worker has wedged at prover init on these runners without a clear
      # error. Print the device/driver/linkage state up front so a wedge is
      # diagnosable from the job log alone.
      - name: GPU diagnostics
        run: |
          echo "--- nvidia-smi ---"; nvidia-smi || echo "nvidia-smi FAILED (driver not ready?)"
          echo "--- device nodes ---"; ls -l /dev/nvidia* 2>&1 || true
          echo "--- nvidia kernel modules ---"; lsmod | grep -i nvidia || echo "no nvidia modules loaded"
          echo "--- CUDA libs resolved by the suite binary ---"
          ldd ./sp1-test-cluster | grep -Ei "cuda|nvrtc|nvtools|not found" || echo "no cuda-related dynamic deps"

      - name: circuit-artifacts-cache
        uses: actions/cache@v3
        with:
          path: ~/.sp1/circuits
          key: sp1-circuits-${{ hashFiles('Cargo.lock') }}
          restore-keys: sp1-circuits-

      # Scenarios pull these via testcontainers; parallel cold pulls have hit docker
      # blob races on fresh runners (GetImageBlob: no such file or directory).
      # Pre-pull sequentially with retries so the suite starts from a warm image cache.
      - name: Pre-pull container images
        run: |
          # The runner's docker data-root lives on the ephemeral RAID and has shipped
          # with corrupt overlay state (layer registration / GetImageBlob failures on
          # every pull). Re-initialize it from scratch before pulling anything.
          sudo systemctl stop docker
          sudo rm -rf /var/lib/docker/* 2>/dev/null || true
          sudo systemctl start docker
          docker info >/dev/null
          for img in bitnamisecure/redis:latest bitnamisecure/postgresql:latest minio/minio:latest; do
            for attempt in 1 2 3; do
              docker pull -q "$img" && break
              echo "pull $img failed (attempt $attempt); retrying" && sleep 5
            done
          done

      - name: Run suite
        run: |
          chmod +x ./sp1-test-cluster
          ./sp1-test-cluster suite ${{ github.event_name == 'pull_request' && 'smoke' || 'full' }}

      - name: Upload scenario logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ github.event_name == 'pull_request' && 'smoke' || 'full' }}-gpu-logs
          path: target/test-cluster-logs/
