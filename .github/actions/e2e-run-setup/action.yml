name: e2e-run-setup
description: Runtime-only setup for GPU e2e jobs running the prebuilt suite binary.

runs:
  using: composite
  steps:
    # The prebuilt binary links libcudart dynamically; install just the CUDA runtime
    # (the GPU AMI provides the driver). Tiny compared to the full toolkit.
    - name: Install CUDA runtime libraries
      shell: bash
      run: |
        if ! ldconfig -p | grep -q libcudart.so.13; then
          repo="ubuntu$(. /etc/os-release; echo ${VERSION_ID//./})"
          wget -q "https://developer.download.nvidia.com/compute/cuda/repos/${repo}/x86_64/cuda-keyring_1.1-1_all.deb"
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update -qq
          sudo apt-get install -y -qq cuda-cudart-13-0
        fi
        echo "LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

    - name: circuit-artifacts-cache
      uses: actions/cache@v3
      with:
        path: ~/.sp1/circuits
        key: sp1-circuits-${{ hashFiles('Cargo.lock') }}
        restore-keys: sp1-circuits-

    # The runner's docker data-root lives on the ephemeral RAID and has shipped with
    # corrupt overlay state (layer registration / GetImageBlob failures on every
    # pull). Re-initialize it from scratch before pulling anything.
    - name: Pre-pull container images
      shell: bash
      run: |
        sudo systemctl stop docker
        sudo rm -rf /var/lib/docker/* 2>/dev/null || true
        sudo systemctl start docker
        docker info >/dev/null
        for img in bitnamisecure/redis:latest bitnamisecure/postgresql:latest minio/minio:latest; do
          for attempt in 1 2 3; do
            docker pull -q "$img" && break
            echo "pull $img failed (attempt $attempt); retrying" && sleep 5
          done
        done
