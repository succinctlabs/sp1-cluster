name: e2e-run-setup
description: Runtime-only setup for GPU e2e jobs running the prebuilt suite binary.

runs:
  using: composite
  steps:
    # The prover needs the full CUDA RUNTIME library set, not just cudart: it does
    # runtime kernel codegen via NVRTC and uses NVTX — same reason the node's runtime
    # image is nvidia/cuda:13.0.1-runtime (see infra/Dockerfile.node_gpu). Without
    # libnvrtc the GPU worker wedges during prover init and never registers, and every
    # scenario times out waiting for workers. cuda-libraries-13-0 is the runtime
    # metapackage (cudart+nvrtc+cublas+...), still far smaller than the toolkit; the
    # GPU AMI provides the driver.
    - name: Install CUDA runtime libraries
      shell: bash
      run: |
        repo="ubuntu$(. /etc/os-release; echo ${VERSION_ID//./})"
        wget -q "https://developer.download.nvidia.com/compute/cuda/repos/${repo}/x86_64/cuda-keyring_1.1-1_all.deb"
        sudo dpkg -i cuda-keyring_1.1-1_all.deb
        sudo apt-get update -qq
        if ! ldconfig -p | grep -q libnvrtc.so.13; then
          sudo apt-get install -y -qq cuda-libraries-13-0 libnvtoolsext1
        fi
        # The stock runner AMI ships WITHOUT the NVIDIA driver. (The old single-job
        # green runs got it implicitly: cuda-toolkit's apt recommends pulled it in.)
        # Without it cuInit finds no device and the GPU worker never registers.
        if ! nvidia-smi >/dev/null 2>&1; then
          sudo apt-get install -y -qq cuda-drivers
          sudo modprobe nvidia || true
          nvidia-smi
        fi
        echo "LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

    # The GPU worker has wedged at prover init on these runners without a clear error.
    # Print the device/driver/linkage state up front so a wedge is diagnosable from the
    # job log alone.
    - name: GPU diagnostics
      shell: bash
      run: |
        echo "--- nvidia-smi ---"; nvidia-smi || echo "nvidia-smi FAILED (driver not ready?)"
        echo "--- device nodes ---"; ls -l /dev/nvidia* 2>&1 || true
        echo "--- nvidia kernel modules ---"; lsmod | grep -i nvidia || echo "no nvidia modules loaded"
        echo "--- CUDA libs resolved by the suite binary ---"
        BIN=$(find . -name sp1-test-cluster -type f 2>/dev/null | head -1)
        [ -n "$BIN" ] && (LD_LIBRARY_PATH=/usr/local/cuda/lib64 ldd "$BIN" | grep -Ei "cuda|nvrtc|nvtools|not found" || echo "no cuda-related dynamic deps")

    - name: circuit-artifacts-cache
      uses: actions/cache@v3
      with:
        path: ~/.sp1/circuits
        key: sp1-circuits-${{ hashFiles('Cargo.lock') }}
        restore-keys: sp1-circuits-

    # The runner's docker data-root lives on the ephemeral RAID and has shipped with
    # corrupt overlay state (layer registration / GetImageBlob failures on every
    # pull). Re-initialize it from scratch before pulling anything.
    - name: Pre-pull container images
      shell: bash
      run: |
        sudo systemctl stop docker
        sudo rm -rf /var/lib/docker/* 2>/dev/null || true
        sudo systemctl start docker
        docker info >/dev/null
        for img in bitnamisecure/redis:latest bitnamisecure/postgresql:latest minio/minio:latest; do
          for attempt in 1 2 3; do
            docker pull -q "$img" && break
            echo "pull $img failed (attempt $attempt); retrying" && sleep 5
          done
        done
